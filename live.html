  <!--
    Standalone live game tracker. Open directly with ?gamePk=NNN, or with no
    params it auto-finds the current/next/most-recent Mariners game.
    Self-contained: no build step, no dependencies. Data: MLB Stats API.
    This file does NOT affect index.html / mariners.html.
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0C2C56; --teal: #005C5C; --light-teal: #00B2A9;
      --silver: #C4CED4; --white: #fff; --yes: #00B2A9; --no: #E74C3C;
      --gold: #FFC52F;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(ellipse at 80% -10%, rgba(0,92,92,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 0% 110%, rgba(0,178,169,0.22) 0%, transparent 55%),
        linear-gradient(160deg, #06121f 0%, #0C2C56 48%, #003a3a 100%);
      background-attachment: fixed;
      color: var(--white); min-height: 100vh; padding: 0 0 50px;
      overflow-x: hidden;
    }
    .stripe { height: 5px; background: linear-gradient(90deg,#005C5C,#00B2A9 40%,#C4CED4 60%,#00B2A9 80%,#005C5C); }

    header { text-align: center; padding: 22px 16px 10px; position: relative; }
    .logos { display: flex; align-items: center; justify-content: center; gap: 18px; }
    .logos img { width: 46px; height: 46px; filter: drop-shadow(0 0 10px rgba(0,178,169,0.5)); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 7px; margin: 12px auto 0;
      padding: 5px 14px; border-radius: 20px; font-size: .72rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .status-badge.live { background: rgba(231,76,60,0.16); border: 1px solid rgba(231,76,60,0.6); color: #ff7a6c; }
    .status-badge.preview { background: rgba(255,197,47,0.15); border: 1px solid rgba(255,197,47,0.5); color: var(--gold); }
    .status-badge.final { background: rgba(196,206,212,0.12); border: 1px solid rgba(196,206,212,0.35); color: var(--silver); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5a48; animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.7)} }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 16px; }
    @media (min-width: 760px) { .grid { grid-template-columns: 1.3fr 1fr; } .span2 { grid-column: 1 / -1; } }

    .card {
      background: linear-gradient(160deg, rgba(12,56,100,0.78), rgba(8,30,58,0.9));
      border: 1px solid rgba(0,178,169,0.28); border-radius: 18px; padding: 22px;
      position: relative; overflow: hidden;
      box-shadow: 0 6px 26px rgba(0,0,0,0.45), 0 1px 0 rgba(0,178,169,0.2) inset;
    }
    .card-h { font-size: .72rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--light-teal); margin-bottom: 16px; }

    /* Scoreboard */
    .score { display: flex; align-items: center; justify-content: space-around; gap: 10px; }
    .team { text-align: center; flex: 1; }
    .team-name { font-size: .85rem; color: var(--silver); font-weight: 600; min-height: 2.4em; display:flex; align-items:flex-end; justify-content:center; }
    .team-runs { font-size: clamp(3.2rem, 11vw, 5rem); font-weight: 900; line-height: 1; transition: transform .25s; }
    .team-runs.mar { color: var(--light-teal); text-shadow: 0 0 28px rgba(0,178,169,0.5); }
    .team-runs.opp { color: var(--silver); }
    .team-runs.bump { animation: bump .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes bump { 0%{transform:scale(1)} 35%{transform:scale(1.35)} 100%{transform:scale(1)} }
    .score-mid { color: rgba(255,255,255,0.25); font-size: 2rem; }
    .inning { text-align: center; margin-top: 12px; font-size: 1rem; color: var(--silver); font-weight: 600; }
    .inning .arrow { color: var(--gold); }

    /* Count + bases */
    .situation { display: flex; align-items: center; justify-content: center; gap: 34px; margin-top: 18px; }
    .count-grid { display: grid; grid-template-columns: auto repeat(4, 14px); gap: 6px 5px; align-items: center; }
    .count-grid .lbl { font-size: .62rem; letter-spacing: 1px; color: rgba(196,206,212,0.6); text-transform: uppercase; }
    .pip { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
    .pip.on.ball { background: var(--gold); border-color: var(--gold); }
    .pip.on.strike { background: #ff5a48; border-color: #ff5a48; }
    .pip.on.out { background: var(--silver); border-color: var(--silver); }
    .pip.out-pip { width: 11px; height: 11px; }
    .bases { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .base-row { display: flex; align-items: center; gap: 3px; }
    .base { width: 16px; height: 16px; transform: rotate(45deg); border: 2px solid rgba(255,255,255,0.35); border-radius: 2px; background: transparent; transition: all .25s; }
    .base.on { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 14px rgba(255,197,47,0.7); }
    .base-home { width: 16px; height: 16px; }

    /* Hero "more than 3" */
    .hero { text-align: center; }
    .hero-q { font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--silver); margin-bottom: 8px; }
    .hero-verdict { font-size: clamp(3.5rem, 14vw, 6rem); font-weight: 900; line-height: 1; letter-spacing: -2px; transition: color .3s; }
    .hero-verdict.yes { color: var(--yes); text-shadow: 0 0 40px rgba(0,178,169,0.5); }
    .hero-verdict.no  { color: var(--no);  text-shadow: 0 0 40px rgba(231,76,60,0.4); }
    .hero-meter { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .run-pip { width: 30px; height: 30px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.85rem; color: rgba(255,255,255,0.4); transition: all .3s; }
    .run-pip.filled { background: var(--light-teal); border-color: var(--light-teal); color: #06242a; box-shadow: 0 0 16px rgba(0,178,169,0.5); }
    .run-pip.fourth { border-style: dashed; }
    .run-pip.fourth.filled { background: var(--gold); border-color: var(--gold); color: #3a2c00; box-shadow: 0 0 20px rgba(255,197,47,0.7); }
    .hero-note { margin-top: 14px; font-size: .9rem; color: var(--silver); }

    /* Matchup */
    .matchup { display: grid; grid-template-columns: 1fr auto 1fr; gap: 28px; align-items: center; max-width: 560px; margin: 0 auto; }
    .matchup.three { grid-template-columns: 1fr 1fr 1fr; max-width: 720px; }
    .player { text-align: center; }
    .player img { width: 84px; height: 84px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 2px solid rgba(0,178,169,0.4); object-fit: cover; }
    .player .role { font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--light-teal); margin-top: 8px; }
    .player .pname { font-weight: 700; margin-top: 2px; font-size: .95rem; }
    .player .pstat { font-size: .78rem; color: var(--silver); margin-top: 4px; line-height: 1.5; }
    .vs { color: rgba(255,255,255,0.3); font-weight: 800; font-size: .9rem; }
    .sv-note { margin-top: 8px; font-size: .72rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); font-weight: 800; }

    /* Win prob */
    .wp-bar { height: 26px; border-radius: 13px; background: rgba(231,76,60,0.25); overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
    .wp-fill { height: 100%; background: linear-gradient(90deg, #008b85, var(--light-teal)); width: 50%; transition: width .6s ease; }
    .wp-labels { display: flex; justify-content: space-between; font-size: .78rem; margin-top: 8px; color: var(--silver); }

    /* ---- Win Probability line graph ---- */
    .wp-graph { width: 100%; display: block; margin-top: 10px; overflow: visible; }

    /* ---- Pitch Zone ---- */
    .pz-ab-label { font-size: .72rem; color: var(--silver); text-align: center; margin-bottom: 8px; min-height: 1.1em; }
    .pz-svg { width: 100%; display: block; max-width: 220px; margin: 0 auto; }
    .pz-legend { display: flex; justify-content: center; gap: 14px; margin-top: 8px; font-size: .68rem; color: var(--silver); align-items: center; }
    .pz-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; }
    .pz-dot.strike { background: #E74C3C; }
    .pz-dot.ball   { background: #3EC88C; }
    .pz-dot.foul   { background: #FFC52F; }
    .pz-dot.inp    { background: #00B2A9; }

    /* ---- Last Pitch ---- */
    .lp-speed { font-size: clamp(2.8rem, 10vw, 4rem); font-weight: 900; text-align: center; color: var(--light-teal); line-height: 1; }
    .lp-mph   { text-align: center; font-size: .68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--silver); margin-bottom: 14px; }
    .lp-row   { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: .8rem; }
    .lp-row:last-child { border-bottom: none; }
    .lp-key   { color: rgba(196,206,212,0.6); }
    .lp-val   { font-weight: 600; color: #fff; text-align: right; }

    /* ---- Pitcher Arsenal ---- */
    .arsenal-bars { display: flex; flex-direction: column; gap: 8px; }
    .arsenal-row  { display: grid; grid-template-columns: 120px 1fr 38px 70px; gap: 8px; align-items: center; font-size: .78rem; }
    @media (max-width: 500px) { .arsenal-row { grid-template-columns: 90px 1fr 34px 56px; } }
    .arsenal-name { color: var(--silver); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .arsenal-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 4px; height: 10px; overflow: hidden; }
    .arsenal-bar  { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .arsenal-pct  { text-align: right; font-weight: 700; color: #fff; }
    .arsenal-speed{ color: rgba(196,206,212,0.7); font-size: .72rem; text-align: right; }

    /* ---- Spray Chart ---- */
    .spray-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .spray-svg  { width: 100%; max-width: 300px; display: block; }
    .spray-meta { font-size: .78rem; color: var(--silver); text-align: center; min-height: 1.2em; }

    /* ---- Exit Velocity Toast ---- */
    .ev-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(12,44,86,0.95); border: 1px solid rgba(0,178,169,0.5);
      border-radius: 12px; padding: 10px 22px; display: flex; gap: 14px; align-items: center;
      font-weight: 700; font-size: .95rem; z-index: 200;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none;
    }
    .ev-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .ev-type  { color: var(--silver); font-size: .72rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
    .ev-speed { color: var(--light-teal); font-size: 1.2rem; }
    .ev-angle { color: var(--silver); font-size: .85rem; }

    /* Springfield overrides for new elements */
    body.springfield .lp-speed { color: #FF69B4; }
    body.springfield .lp-key { color: rgba(0,0,0,0.55); }
    body.springfield .lp-val { color: #000; }
    body.springfield .lp-row { border-bottom-color: rgba(0,0,0,0.08); }
    body.springfield .arsenal-name { color: rgba(0,0,0,0.7); }
    body.springfield .arsenal-bar-wrap { background: rgba(0,0,0,0.1); }
    body.springfield .arsenal-pct { color: #000; }
    body.springfield .arsenal-speed { color: rgba(0,0,0,0.5); }
    body.springfield .spray-meta { color: rgba(0,0,0,0.65); }
    body.springfield .pz-ab-label { color: rgba(0,0,0,0.65); }
    body.springfield .pz-legend { color: rgba(0,0,0,0.65); }
    body.springfield .ev-toast { background: #fff; border: 3px solid #000; box-shadow: 4px 4px 0 #000; }
    body.springfield .ev-speed { color: #FF3B30; }
    body.springfield .ev-type, body.springfield .ev-angle { color: #000; }

    /* Goth overrides for new elements */
    body.goth .lp-speed { color: #C8C8C8; }
    body.goth .lp-key { color: #8a8a8a; }
    body.goth .lp-val { color: #E8E8E8; }
    body.goth .lp-row { border-bottom-color: rgba(255,255,255,0.07); }
    body.goth .arsenal-name { color: #9e9e9e; }
    body.goth .arsenal-bar-wrap { background: rgba(255,255,255,0.06); }
    body.goth .arsenal-pct { color: #E8E8E8; }
    body.goth .arsenal-speed { color: #8a8a8a; }
    body.goth .spray-meta { color: #9e9e9e; }
    body.goth .pz-ab-label { color: #9e9e9e; font-family: 'IM Fell English', serif; font-style: italic; }
    body.goth .pz-legend { color: #8a8a8a; }
    body.goth .ev-toast { background: #161616; border-color: rgba(255,255,255,0.2); }
    body.goth .ev-speed { color: #C8C8C8; }
    body.goth .ev-type, body.goth .ev-angle { color: #8a8a8a; }
    .wp-labels b { color: #fff; }

    /* Linescore */
    .ls { width: 100%; border-collapse: collapse; font-size: .72rem; }
    .ls th, .ls td { padding: 5px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.07); min-width: 18px; }
    .ls th { color: rgba(255,255,255,0.3); font-weight: 600; }
    .ls td.tm { text-align: left; font-weight: 700; color: var(--silver); padding-right: 8px; }
    .ls td.tot { font-weight: 700; color: #fff; }
    .ls td.cur { background: rgba(0,178,169,0.18); border-radius: 4px; }

    /* Plays */
    .plays { display: flex; flex-direction: column; gap: 8px; max-height: 230px; overflow-y: auto; }
    .play { padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.04); border-left: 3px solid rgba(0,178,169,0.4); font-size: .82rem; color: var(--silver); }
    .play.scoring { border-left-color: var(--gold); background: rgba(255,197,47,0.08); color: #fff; }
    .play .pt { font-size: .62rem; color: rgba(196,206,212,0.55); text-transform: uppercase; letter-spacing: 1px; }

    /* Preview / final big text */
    .big-time { text-align: center; font-size: clamp(2rem, 7vw, 3rem); font-weight: 800; margin: 8px 0; }
    .sub-c { text-align: center; color: var(--silver); }
    .muted { color: rgba(196,206,212,0.5); font-size: .8rem; }

    /* Controls */
    .controls { display: flex; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .btn { font: inherit; cursor: pointer; border-radius: 999px; padding: 7px 16px; font-size: .75rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border: 1px solid rgba(0,178,169,0.45); background: rgba(12,44,86,0.6); color: var(--silver); transition: all .15s; }
    .btn:hover { transform: translateY(-1px); }
    .btn.on { background: var(--light-teal); color: #06242a; border-color: var(--light-teal); }

    .updated { text-align: center; font-size: .72rem; color: rgba(255,255,255,0.3); margin-top: 18px; }
    #loading, #fatal { text-align: center; padding: 90px 20px; color: var(--silver); }
    #fatal { display: none; color: #ff8a7c; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.12); border-top-color: var(--light-teal); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; }

    /* Confetti */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 90; overflow: hidden; }
    .confo { position: absolute; width: 9px; height: 14px; top: -20px; opacity: 0; animation: fall linear forwards; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 1; } }

    /* ============================================================
       SPRINGFIELD THEME (opt-in: body.springfield)
       Sky gradient, Fredoka/Nunito, thick black outlines, Simpson
       yellow/pink/green highlights, white cards with hard shadows.
       Matches the established language in mariners.html.
       ============================================================ */
    .clouds { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; display: none; }
    body.springfield .clouds { display: block; }
    .cloud { position: absolute; filter: drop-shadow(0 6px 0 rgba(0,0,0,0.05)); }
    .cloud svg { display: block; }
    @keyframes drift { from { transform: translateX(-30vw); } to { transform: translateX(130vw); } }
    .cloud.c1 { top: 6%;  animation: drift 75s  linear infinite; animation-delay: -10s; }
    .cloud.c2 { top: 26%; animation: drift 115s linear infinite; animation-delay: -60s; }
    .cloud.c2 svg { transform: scale(1.5); }
    .cloud.c3 { top: 50%; animation: drift 95s  linear infinite; animation-delay: -30s; opacity: 0.85; }
    .cloud.c3 svg { transform: scale(0.85); }
    .cloud.c4 { top: 72%; animation: drift 140s linear infinite; animation-delay: -95s; opacity: 0.7; }
    .cloud.c4 svg { transform: scale(1.1); }
    header, .wrap, .stripe, #loading, #fatal, #confetti { position: relative; z-index: 1; }

    body.springfield {
      font-family: 'Nunito', sans-serif;
      color: #000;
      background: linear-gradient(180deg, #cdeffb 0%, #9bd9f1 50%, #74c6e8 100%);
      background-attachment: fixed;
      --toon-outline:
        -2px -2px 0 #000, -2px 0 0 #000, -2px 2px 0 #000,
         0   -2px 0 #000,                 0   2px 0 #000,
         2px -2px 0 #000,  2px 0 0 #000,  2px 2px 0 #000,
        -3px  0   0 #000,  3px 0 0 #000,  0  -3px 0 #000, 0 3px 0 #000;
    }
    body.springfield .stripe { height: 6px; background: linear-gradient(90deg, #FF3B30, #FFD90F, #7ED957, #4A4EFF, #FF69B4); }

    body.springfield .logos img { filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.3)); }
    body.springfield .status-badge { border: 2px solid #000; box-shadow: 2px 2px 0 #000; color: #000; font-family: 'Fredoka', sans-serif; }
    body.springfield .status-badge.live { background: #FFD90F; }
    body.springfield .status-badge.preview { background: #FFD90F; }
    body.springfield .status-badge.final { background: #fff; }
    body.springfield .live-dot { background: #FF3B30; }

    body.springfield .btn {
      font-family: 'Fredoka', sans-serif; border: 3px solid #000; background: #fff;
      color: #000; box-shadow: 3px 3px 0 #000; backdrop-filter: none; -webkit-backdrop-filter: none;
    }
    body.springfield .btn:hover { transform: translateY(-2px) scale(1.03); }
    body.springfield .btn.on { background: #FF69B4; color: #000; border-color: #000; box-shadow: 3px 3px 0 #000; }

    body.springfield .card {
      background: #fff; border: 3px solid #000; border-radius: 22px;
      box-shadow: 6px 6px 0 #000; backdrop-filter: none; -webkit-backdrop-filter: none;
    }
    body.springfield .card-h { color: #FF69B4; font-family: 'Fredoka', sans-serif; }

    /* Big display numbers: cartoon outline via layered shadow (no spurs).
       The time string is excluded: a heavy outline on longer text reads as
       chunky/mushy, so it gets a clean Fredoka treatment instead. */
    body.springfield .team-runs, body.springfield .hero-verdict {
      -webkit-text-stroke: 0; text-shadow: var(--toon-outline);
    }
    body.springfield .big-time {
      color: #000;
      font-weight: 600;
      letter-spacing: 0.5px;

  <script>
    const TEAM_ID = 136, THRESHOLD = 3;
    const API = 'https://statsapi.mlb.com';
    const $ = id => document.getElementById(id);

    let pollTimer = null, gamePk = null;
    let prev = { marRuns: null, outs: null, playIdx: null, strikes: null, lastBattedIdx: null };

    /* ---------- design (Classic default, Springfield + Goth opt-in) ---------- */
    function setDesign(d) {
      const sf = d === 'springfield';
      const goth = d === 'goth';
      document.body.classList.toggle('springfield', sf);
      document.body.classList.toggle('goth', goth);
      $('btn-classic').classList.toggle('on', !sf && !goth);
      $('btn-springfield').classList.toggle('on', sf);
      $('btn-goth').classList.toggle('on', goth);
    }
    $('btn-classic').onclick = () => setDesign('classic');
    $('btn-springfield').onclick = () => setDesign('springfield');
    $('btn-goth').onclick = () => setDesign('goth');
    // Honor ?design= passed from the dashboard; default to Classic.
    (function () {
      const d = new URLSearchParams(location.search).get('design');
      setDesign(d === 'springfield' || d === 'goth' ? d : 'classic');
    })();

    $('btn-refresh').onclick = () => poll();

    /* ---------- confetti ---------- */
    function confetti(n) {
      const c = $('confetti');
      const colors = document.body.classList.contains('springfield')
        ? ['#FFD90F', '#FF69B4', '#7ED957', '#4A4EFF', '#FF3B30']
        : document.body.classList.contains('goth')
        ? ['#8B1A1A', '#C8C8C8', '#999999', '#E8E8E8', '#444444']
        : ['#00B2A9', '#FFC52F', '#C4CED4', '#ffffff', '#005C5C'];
      for (let i = 0; i < (n || 80); i++) {
        const d = document.createElement('div');
        d.className = 'confo';
        d.style.left = Math.random() * 100 + 'vw';
        d.style.background = colors[i % colors.length];
        d.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
        d.style.animationDelay = (Math.random() * 0.4) + 's';
        c.appendChild(d);
        setTimeout(() => d.remove(), 3800);
      }
    }

    /* ---------- data helpers ---------- */
    async function getJSON(url) { const r = await fetch(url); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }
    function dstr(off) { const d = new Date(); d.setDate(d.getDate() + (off || 0)); return d.toISOString().slice(0, 10); }
    function teamAbbr(g, side) { return (g.gameData.teams[side].abbreviation) || g.gameData.teams[side].name.split(' ').pop().slice(0, 3).toUpperCase(); }
    function headshot(id) { return `https://midfield.mlbstatic.com/v1/people/${id}/spots/120`; }
    function logo(id) { return `https://www.mlbstatic.com/team-logos/${id}.svg`; }

    async function resolveGamePk() {
      const u = new URLSearchParams(location.search);
      if (u.get('gamePk')) return u.get('gamePk');
      // window around today first
      const url = `${API}/api/v1/schedule?sportId=1&teamId=${TEAM_ID}&startDate=${dstr(-1)}&endDate=${dstr(1)}`;
      let data = await getJSON(url);
      let games = [];
      for (const d of (data.dates || [])) for (const g of d.games) games.push(g);
      let pick = games.find(g => g.status.abstractGameState === 'Live')
        || games.find(g => g.status.abstractGameState === 'Preview')
        || games.slice().reverse().find(g => g.status.abstractGameState === 'Final');
      if (pick) return pick.gamePk;
      // fall back to most recent final this season
      const yr = new Date().getFullYear();
      data = await getJSON(`${API}/api/v1/schedule?sportId=1&teamId=${TEAM_ID}&season=${yr}&gameType=R&startDate=${yr}-03-01&endDate=${dstr(0)}`);
      const finals = [];
      for (const d of (data.dates || [])) for (const g of d.games) if (g.status.abstractGameState === 'Final') finals.push(g);
      if (finals.length) return finals[finals.length - 1].gamePk;
      throw new Error('No Mariners game found.');
    }

    function boxPlayer(feed, id) {
      const t = feed.liveData.boxscore.teams;
      return (t.home.players['ID' + id]) || (t.away.players['ID' + id]) || null;
    }

    // Most recent fully-completed play in the feed.
    function lastCompletedPlay(feed) {
      const plays = (feed.liveData.plays && feed.liveData.plays.allPlays) || [];
      for (let i = plays.length - 1; i >= 0; i--) {
        if (plays[i].about && plays[i].about.isComplete) return plays[i];
      }
      return null;
    }
    // True when the given play is a home run hit by the Mariners.
    function isMarinersHR(play, marIsHome) {
      if (!play || !play.result || play.result.eventType !== 'home_run') return false;
      const battingIsHome = play.about && !play.about.isTopInning; // home bats in the bottom half
      return battingIsHome === marIsHome;
    }

    /* ---------- render ---------- */
    function render(feed) {
      const gd = feed.gameData, ld = feed.liveData;
      const state = gd.status.abstractGameState;
      const homeId = gd.teams.home.id, awayId = gd.teams.away.id;
      const marIsHome = homeId === TEAM_ID;
      const marSide = marIsHome ? 'home' : 'away';

      $('logo-home').src = logo(homeId); $('logo-away').src = logo(awayId);
      $('home-name').textContent = gd.teams.home.teamName || gd.teams.home.name;
      $('away-name').textContent = gd.teams.away.teamName || gd.teams.away.name;
      $('home-runs').className = 'team-runs ' + (marIsHome ? 'mar' : 'opp');
      $('away-runs').className = 'team-runs ' + (marIsHome ? 'opp' : 'mar');

      // status badge
      const sw = $('status-wrap');
      if (state === 'Live') sw.innerHTML = '<span class="status-badge live"><span class="live-dot"></span>Live</span>';
      else if (state === 'Preview') { const dt = gd.datetime && gd.datetime.dateTime ? new Date(gd.datetime.dateTime) : null; const ds = dt ? dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''; sw.innerHTML = '<span class="status-badge preview">' + (gd.status.detailedState || 'Scheduled') + (ds ? ' · ' + ds : '') + '</span>'; }
      else sw.innerHTML = '<span class="status-badge final">Final</span>';

      const ls = ld.linescore || {};
      const homeR = (ls.teams && ls.teams.home.runs) || 0;
      const awayR = (ls.teams && ls.teams.away.runs) || 0;
      const marRuns = marIsHome ? homeR : awayR;

      // PREVIEW
      if (state === 'Preview') {
        $('situation').style.display = 'none';
        $('inning').textContent = '';
        $('home-runs').textContent = '-'; $('away-runs').textContent = '-';
        const t = gd.datetime && gd.datetime.dateTime ? new Date(gd.datetime.dateTime) : null;
        const pp = gd.probablePitchers || {};
        $('pre-fin').innerHTML =
          `<div class="big-time">${t ? t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}) : 'TBD'}</div>
           <div class="sub-c">${gd.venue ? gd.venue.name : ''}</div>
           <div class="sub-c muted" style="margin-top:10px;">Probable: ${(pp.away&&pp.away.fullName)||'TBD'} vs ${(pp.home&&pp.home.fullName)||'TBD'}</div>`;
        $('matchup-head').textContent = 'Probable Pitchers';
        setProbable(gd, feed);
      } else {
        $('pre-fin').innerHTML = '';
        $('home-runs').textContent = homeR; $('away-runs').textContent = awayR;
        $('matchup-head').textContent = state === 'Final' ? 'Decisions' : 'At Bat';
      }

      // bump animation on Mariners run change
      if (prev.marRuns !== null && marRuns > prev.marRuns) {
        const el = marIsHome ? $('home-runs') : $('away-runs');
        el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
        const hr = isMarinersHR(lastCompletedPlay(feed), marIsHome);
        const crossed = prev.marRuns <= THRESHOLD && marRuns > THRESHOLD;
        if (hr) {
          confetti(crossed ? 150 : 100);
        } else if (crossed) {
          confetti(120);
        }
      }

      // LIVE situation
      if (state === 'Live') {
        $('situation').style.display = 'flex';
        $('inning').innerHTML = `<span class="arrow">${ls.isTopInning ? '&#9650;' : '&#9660;'}</span> ${ls.inningState || ''} ${ls.currentInningOrdinal || ''}`;
        renderCount(ls);
        const off = ls.offense || {};
        $('b1').classList.toggle('on', !!off.first);
        $('b2').classList.toggle('on', !!off.second);
        $('b3').classList.toggle('on', !!off.third);
        renderMatchup(feed);
        renderPitchZone(feed);
        renderLastPitch(feed);
        renderArsenal(feed);

        // Exit velocity flash on new ball in play
        const allPlaysComplete = ((feed.liveData.plays && feed.liveData.plays.allPlays) || [])
          .filter(p => p.about && p.about.isComplete);
        if (allPlaysComplete.length) {
          const lp = allPlaysComplete[allPlaysComplete.length - 1];
          const lpIdx = lp.about && lp.about.atBatIndex;
          if (lpIdx !== prev.lastBattedIdx) {
            const hitEv = (lp.playEvents || []).find(e => e.hitData && e.hitData.launchSpeed);
            if (hitEv) {
              flashEV(hitEv.hitData.launchSpeed, hitEv.hitData.launchAngle, lp.result && lp.result.event);
            }
            prev.lastBattedIdx = lpIdx;
          }
        }
        prev.strikes = ls.strikes; prev.outs = ls.outs;
      } else if (state === 'Final') {
        $('card-pitch-zone').style.display = 'none';
        $('card-last-pitch').style.display = 'none';
        $('card-arsenal').style.display = 'none';
        $('situation').style.display = 'none';
        $('inning').textContent = 'Final' + (ls.currentInning && ls.currentInning > 9 ? ` / ${ls.currentInning}` : '');
        renderDecisions(feed);
      }

      // hero
      renderHero(state, marRuns, marIsHome, gd);
      // linescore + plays
      renderLinescore(ls, teamAbbr(feed, 'away'), teamAbbr(feed, 'home'), state === 'Live' ? ls.currentInning : 0);
      renderPlays(ld);
      renderSprayChart(feed);
      renderWinProb(state, marSide);

      prev.marRuns = marRuns;
      $('score-head').textContent = `${gd.teams.away.teamName} at ${gd.teams.home.teamName}`;
      $('updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
      $('loading').style.display = 'none'; $('app').style.display = 'block';
    }

    function renderCount(ls) {
      const mk = (n, max, cls) => { let s = ''; for (let i = 0; i < max; i++) s += `<span class="pip ${cls} ${i < (n||0) ? 'on' : ''} ${cls === 'out' ? 'out-pip' : ''}"></span>`; return s; };
      $('count').innerHTML =
        `<span class="lbl">B</span>${mk(ls.balls, 4, 'ball')}` +
        `<span class="lbl">S</span>${mk(ls.strikes, 3, 'strike')}<span></span>` +
        `<span class="lbl">O</span>${mk(ls.outs, 3, 'out')}<span></span>`;
    }

    function renderMatchup(feed) {
      const cp = feed.liveData.plays && feed.liveData.plays.currentPlay;
      const m = cp && cp.matchup; if (!m) return;
      const bat = m.batter, pit = m.pitcher;
      $('bat-img').src = headshot(bat.id); $('bat-name').textContent = bat.fullName || '-';
      $('pit-img').src = headshot(pit.id); $('pit-name').textContent = pit.fullName || '-';
      const bp = boxPlayer(feed, bat.id), pp = boxPlayer(feed, pit.id);
      const bs = bp && bp.seasonStats && bp.seasonStats.batting;
      const bg = bp && bp.stats && bp.stats.batting;
      $('bat-stat').innerHTML = bs ? `${bg ? (bg.summary || '') + ' today<br>' : ''}AVG ${bs.avg} &middot; ${bs.homeRuns} HR &middot; ${bs.rbi} RBI` : '';
      const ps = pp && pp.seasonStats && pp.seasonStats.pitching;
      const pg = pp && pp.stats && pp.stats.pitching;
      $('pit-stat').innerHTML = ps ? `${pg ? `${pg.numberOfPitches||0} P &middot; ${pg.strikeOuts||0} K today<br>` : ''}ERA ${ps.era} &middot; ${ps.wins}-${ps.losses}` : '';
    }

    function setProbable(gd, feed) {
      const pp = gd.probablePitchers || {};
      const marIsHome = gd.teams.home.id === TEAM_ID;
      const marP = marIsHome ? pp.home : pp.away, oppP = marIsHome ? pp.away : pp.home;
      $('bat-img').src = marP ? headshot(marP.id) : ''; $('bat-name').textContent = marP ? marP.fullName : 'TBD';
      $('pit-img').src = oppP ? headshot(oppP.id) : ''; $('pit-name').textContent = oppP ? oppP.fullName : 'TBD';
      const oppTeam = (gd.teams[marIsHome ? 'away' : 'home'].teamName) || 'Opponent';
      $('bat-stat').innerHTML = 'Mariners starter'; $('pit-stat').innerHTML = oppTeam + ' starter';
      document.querySelectorAll('#card-matchup .role')[0].textContent = 'Mariners';
      document.querySelectorAll('#card-matchup .role')[1].textContent = oppTeam;
    }

    function renderDecisions(feed) {
      const dec = feed.liveData.decisions;
      if (!dec) { $('bat-name').textContent = ''; $('pit-name').textContent = ''; return; }
      decisionPitcher(feed, 'bat', dec.winner, 'Win');
      decisionPitcher(feed, 'pit', dec.loser, 'Loss');
      $('matchup').classList.toggle('three', !!dec.save);
      if (dec.save) {
        const bp = boxPlayer(feed, dec.save.id);
        const s = bp && bp.seasonStats && bp.seasonStats.pitching;
        const g = bp && bp.stats && bp.stats.pitching;
        const lines = [];
        if (g && g.inningsPitched) lines.push(`${g.inningsPitched} IP &middot; ${g.strikeOuts || 0} K`);
        if (s) lines.push(`${s.saves} SV &middot; ${s.era} ERA`);
        $('vs-center').innerHTML = `<img src="${headshot(dec.save.id)}" alt=""><div class="role">Save</div><div class="pname">${dec.save.fullName}</div><div class="pstat">${lines.join('<br>')}</div>`;
        $('vs-center').className = 'player';
      } else {
        $('vs-center').className = 'vs'; $('vs-center').textContent = '';
      }
    }
    function decisionPitcher(feed, side, p, role) {
      document.querySelectorAll('#card-matchup .role')[side === 'bat' ? 0 : 1].textContent = role;
      $(side + '-img').src = p ? headshot(p.id) : '';
      $(side + '-name').textContent = p ? p.fullName : '-';
      const bp = p && boxPlayer(feed, p.id);
      const s = bp && bp.seasonStats && bp.seasonStats.pitching;
      const g = bp && bp.stats && bp.stats.pitching;
      const lines = [];
      if (g && g.inningsPitched) lines.push(`${g.inningsPitched} IP &middot; ${g.strikeOuts || 0} K &middot; ${g.earnedRuns || 0} ER`);
      if (s) lines.push(`${s.wins}-${s.losses} &middot; ${s.era} ERA`);
      $(side + '-stat').innerHTML = lines.join('<br>') || '';
    }

    function renderHero(state, marRuns, marIsHome, gd) {
      $('hero-head').textContent = state === 'Final' ? 'Did the Mariners score more than 3?' : 'Did the Mariners score more than 3 today?';
      const verdict = marRuns > THRESHOLD;
      const hv = $('hero-verdict');
      if (state === 'Preview') {
        hv.textContent = 'TBD'; hv.className = 'hero-verdict'; hv.style.color = 'var(--silver)';
        $('hero-meter').innerHTML = ''; $('hero-note').textContent = 'First pitch coming up.';
        return;
      }
      hv.style.color = '';
      hv.textContent = verdict ? 'YES' : 'NO';
      hv.className = 'hero-verdict ' + (verdict ? 'yes' : 'no');
      let m = '';
      for (let i = 1; i <= 4; i++) {
        const filled = marRuns >= i;
        m += `<div class="run-pip ${i === 4 ? 'fourth' : ''} ${filled ? 'filled' : ''}">${i === 4 ? '4+' : i}</div>`;
      }
      $('hero-meter').innerHTML = m;
      $('hero-note').textContent = state === 'Final'
        ? (verdict ? `They scored ${marRuns}. Yes.` : `They scored ${marRuns}. No.`)
        : (verdict ? `Up to ${marRuns} runs. They cleared it.` : `${marRuns} so far, need ${THRESHOLD + 1 - marRuns} more.`);
    }

    function renderLinescore(ls, awayAbbr, homeAbbr, curInning) {
      const innings = ls.innings || [];
      if (!innings.length && !(ls.teams)) { $('linescore').innerHTML = '<p class="muted">No linescore yet.</p>'; return; }
      const total = Math.max(ls.scheduledInnings || 9, innings.length, ls.currentInning || 0);
      const WIN = 9, start = total > WIN ? total - WIN + 1 : 1, end = Math.max(total, WIN);
      let head = '', aRow = '', hRow = '';
      for (let n = start; n <= end; n++) {
        head += `<th>${n}</th>`;
        const inn = innings.find(i => i.num === n);
        const cur = n === curInning ? ' class="cur"' : '';
        aRow += `<td${cur}>${(inn && inn.away && inn.away.runs != null) ? inn.away.runs : ''}</td>`;
        hRow += `<td${cur}>${(inn && inn.home && inn.home.runs != null) ? inn.home.runs : ''}</td>`;
      }
      const tt = ls.teams || { away: {}, home: {} };
      $('linescore').innerHTML =
        `<table class="ls"><thead><tr><th></th>${head}<th>R</th><th>H</th><th>E</th></tr></thead><tbody>
          <tr><td class="tm">${awayAbbr}</td>${aRow}<td class="tot">${tt.away.runs||0}</td><td class="tot">${tt.away.hits||0}</td><td class="tot">${tt.away.errors||0}</td></tr>
          <tr><td class="tm">${homeAbbr}</td>${hRow}<td class="tot">${tt.home.runs||0}</td><td class="tot">${tt.home.hits||0}</td><td class="tot">${tt.home.errors||0}</td></tr>
        </tbody></table>`;
    }

    function renderPlays(ld) {
      const all = (ld.plays && ld.plays.allPlays) || [];
      const done = all.filter(p => p.about && p.about.isComplete).slice(-12).reverse();
      if (!done.length) { $('plays').innerHTML = '<p class="muted">No plays yet.</p>'; return; }
      $('plays').innerHTML = done.map(p => {
        const scoring = p.about && p.about.hasReview === false && p.result && p.result.rbi > 0;
        const half = p.about ? ((p.about.isTopInning ? 'Top ' : 'Bot ') + (p.about.inning || '')) : '';
        return `<div class="play ${p.result && p.result.rbi ? 'scoring' : ''}"><div class="pt">${half}</div>${(p.result && p.result.description) || ''}</div>`;
      }).join('');
    }

    async function renderWinProb(state, marSide) {
      const el = $('card-wp');
      if (state !== 'Live') { el.style.display = 'none'; return; }
      try {
        const wp = await getJSON(`${API}/api/v1/game/${gamePk}/winProbability`);
        if (!wp || !wp.length) { el.style.display = 'none'; return; }

        const last = wp[wp.length - 1];
        if (last.homeTeamWinProbability == null) { el.style.display = 'none'; return; }

        el.style.display = 'block';

        const marWP = marSide === 'home' ? last.homeTeamWinProbability : (100 - last.homeTeamWinProbability);
        $('wp-fill').style.width = marWP + '%';
        $('wp-mar').innerHTML = `<b>Mariners ${Math.round(marWP)}%</b>`;
        $('wp-opp').textContent = `Opp ${Math.round(100 - marWP)}%`;

        // ---- Line graph ----
        const pts = wp.map((e, i) => ({
          x: i,
          y: marSide === 'home' ? e.homeTeamWinProbability : (100 - e.homeTeamWinProbability),
        }));
        const n = pts.length;
        const SVG_W = 400, SVG_H = 80;
        const PL = 32, PR = 10, PT = 8, PB = 14;
        const plotW = SVG_W - PL - PR, plotH = SVG_H - PT - PB;

        const sx = i => PL + (n < 2 ? plotW / 2 : (i / (n - 1)) * plotW);
        const sy = v => PT + (1 - v / 100) * plotH;

        const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join('');
        const area = `M${sx(0).toFixed(1)},${sy(pts[0].y).toFixed(1)}` +
          pts.map(p => `L${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join('') +
          `L${sx(n - 1).toFixed(1)},${(PT + plotH).toFixed(1)} L${PL},${(PT + plotH).toFixed(1)} Z`;

        const curX = sx(n - 1).toFixed(1);
        const curY = sy(pts[n - 1].y).toFixed(1);

        const isGoth = document.body.classList.contains('goth');
        const isSF   = document.body.classList.contains('springfield');
        const lineColor = isGoth ? '#9e9e9e' : isSF ? '#7ED957' : '#00B2A9';
        const areaColor = isGoth ? 'rgba(200,200,200,0.07)' : isSF ? 'rgba(126,217,87,0.12)' : 'rgba(0,178,169,0.1)';

        $('wp-graph').innerHTML = `
          <line x1="${PL}" y1="${sy(50).toFixed(1)}" x2="${SVG_W - PR}" y2="${sy(50).toFixed(1)}"
                stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>
          <text x="${PL - 4}" y="${(sy(100) + 4).toFixed(1)}" text-anchor="end" fill="rgba(255,255,255,0.25)"
                font-size="9" font-family="system-ui,sans-serif">100</text>
          <text x="${PL - 4}" y="${(sy(50) + 4).toFixed(1)}" text-anchor="end" fill="rgba(255,255,255,0.25)"
                font-size="9" font-family="system-ui,sans-serif">50%</text>
          <text x="${PL - 4}" y="${(sy(0) + 4).toFixed(1)}" text-anchor="end" fill="rgba(255,255,255,0.25)"
                font-size="9" font-family="system-ui,sans-serif">0</text>
          <path d="${area}" fill="${areaColor}"/>
          <path d="${line}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="${curX}" cy="${curY}" r="4" fill="${lineColor}"/>
          <text x="${parseFloat(curX) + 7}" y="${(parseFloat(curY) + 4).toFixed(1)}"
                fill="${lineColor}" font-size="10" font-family="system-ui,sans-serif" font-weight="700">
            ${Math.round(pts[n - 1].y)}%
          </text>
        `;
      } catch (e) { $('card-wp').style.display = 'none'; }
    }

    /* ---------- PITCH ZONE ---------- */
    function renderPitchZone(feed) {
      const el = $('card-pitch-zone');
      if (feed.gameData.status.abstractGameState !== 'Live') { el.style.display = 'none'; return; }

      const cp = feed.liveData.plays && feed.liveData.plays.currentPlay;
      if (!cp) { el.style.display = 'none'; return; }

      const pitches = (cp.playEvents || []).filter(
        e => e.isPitch && e.pitchData && e.pitchData.coordinates &&
             e.pitchData.coordinates.pX != null && e.pitchData.coordinates.pZ != null
      );

      el.style.display = 'block';

      const batter = (cp.matchup && cp.matchup.batter && cp.matchup.batter.fullName) || '';
      const pitcher = (cp.matchup && cp.matchup.pitcher && cp.matchup.pitcher.fullName) || '';
      $('pz-ab-label').textContent = batter && pitcher ? `${batter} vs ${pitcher}` : 'Waiting for at-bat...';

      const W = 200, H = 220;
      const PX_MIN = -2.5, PX_RANGE = 5.0;
      const PZ_MAX = 5.0;
      const PAD = 12;
      const PLOT_W = W - 2 * PAD;
      const PLOT_H = H - PAD - 30;

      function svgX(px) { return PAD + (px - PX_MIN) / PX_RANGE * PLOT_W; }
      function svgY(pz) { return PAD + PLOT_H - (pz / PZ_MAX) * PLOT_H; }

      const SZ_L = -0.833, SZ_R = 0.833;
      const first = pitches[0];
      const szTop    = (first && first.pitchData && first.pitchData.strikeZoneTop)    || 3.5;
      const szBottom = (first && first.pitchData && first.pitchData.strikeZoneBottom) || 1.5;

      const zX  = svgX(SZ_L).toFixed(1);
      const zY  = svgY(szTop).toFixed(1);
      const zW  = (svgX(SZ_R) - svgX(SZ_L)).toFixed(1);
      const zH  = (svgY(szBottom) - svgY(szTop)).toFixed(1);
      const zCX = ((svgX(SZ_L) + svgX(SZ_R)) / 2).toFixed(1);

      let gridLines = '';
      const x1 = svgX(SZ_L), x2 = svgX(SZ_R);
      const y1 = svgY(szTop), y2 = svgY(szBottom);
      const dxT = (x2 - x1) / 3, dyT = (y2 - y1) / 3;
      for (let i = 1; i <= 2; i++) {
        gridLines += `<line x1="${(x1+dxT*i).toFixed(1)}" y1="${y1.toFixed(1)}" x2="${(x1+dxT*i).toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>`;
        gridLines += `<line x1="${x1.toFixed(1)}" y1="${(y1+dyT*i).toFixed(1)}" x2="${x2.toFixed(1)}" y2="${(y1+dyT*i).toFixed(1)}" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>`;
      }

      const pY = H - 18, pCX = svgX(0), pHW = svgX(SZ_R) - svgX(0);
      const platePts = [
        `${(pCX-pHW).toFixed(1)},${pY-6}`,
        `${(pCX+pHW).toFixed(1)},${pY-6}`,
        `${(pCX+pHW).toFixed(1)},${pY}`,
        `${pCX.toFixed(1)},${pY+5}`,
        `${(pCX-pHW).toFixed(1)},${pY}`,
      ].join(' ');

      const isGoth = document.body.classList.contains('goth');
      const pitchDots = pitches.map((p, i) => {
        const px = p.pitchData.coordinates.pX;
        const pz = p.pitchData.coordinates.pZ;
        const desc = (p.details && p.details.description || '').toLowerCase();
        const speed = p.pitchData.startSpeed;
        const isLast = i === pitches.length - 1;
        const cx = svgX(px).toFixed(1);
        const cy = svgY(pz).toFixed(1);
        const r = isLast ? 7.5 : 5.5;

        let color = '#888';
        if (desc.includes('called strike') || desc.includes('swinging strike') || desc.includes('foul tip')) {
          color = '#E74C3C';
        } else if (desc.includes('in play')) {
          color = isGoth ? '#C8C8C8' : '#00B2A9';
        } else if (desc.includes('foul')) {
          color = '#FFC52F';
        } else if (desc.includes('ball') || desc.includes('intentional')) {
          color = '#3EC88C';
        }

        return `
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"
            ${isLast ? 'stroke="rgba(255,255,255,0.9)" stroke-width="1.5"' : 'opacity="0.78"'}/>
          <text x="${cx}" y="${(parseFloat(cy) - r - 2).toFixed(1)}" text-anchor="middle"
            fill="rgba(255,255,255,0.65)" font-size="8" font-family="system-ui,sans-serif">${i + 1}</text>
          ${isLast && speed ? `<text x="${cx}" y="${(parseFloat(cy) + r + 9).toFixed(1)}" text-anchor="middle"
            fill="rgba(255,255,255,0.9)" font-size="9" font-family="system-ui,sans-serif" font-weight="700">${speed.toFixed(0)}</text>` : ''}
        `;
      }).join('');

      $('pitch-zone-svg').innerHTML = `
        <rect x="${PAD}" y="${PAD}" width="${PLOT_W}" height="${PLOT_H}" fill="rgba(255,255,255,0.02)" rx="3"/>
        <rect x="${zX}" y="${zY}" width="${zW}" height="${zH}" fill="rgba(0,178,169,0.07)" stroke="rgba(0,178,169,0.65)" stroke-width="1.5"/>
        ${gridLines}
        <text x="${zCX}" y="${(parseFloat(zY) - 3).toFixed(1)}" text-anchor="middle"
          fill="rgba(0,178,169,0.4)" font-size="8" font-family="system-ui,sans-serif">SZ</text>
        <polygon points="${platePts}" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        ${pitchDots}
      `;
    }

    /* ---------- LAST PITCH ---------- */
    function renderLastPitch(feed) {
      const el = $('card-last-pitch');
      if (feed.gameData.status.abstractGameState !== 'Live') { el.style.display = 'none'; return; }

      const cp = feed.liveData.plays && feed.liveData.plays.currentPlay;
      const pitches = (cp && cp.playEvents || []).filter(e => e.isPitch);
      if (!pitches.length) { el.style.display = 'none'; return; }

      el.style.display = 'block';
      const last = pitches[pitches.length - 1];
      const pd  = last.pitchData  || {};
      const det = last.details    || {};
      const brk = pd.breaks       || {};

      const speed  = pd.startSpeed   ? pd.startSpeed.toFixed(1) : '--';
      const type   = (det.type && det.type.description) || '--';
      const result = det.description || '--';
      const spin   = brk.spinRate   ? Math.round(brk.spinRate).toLocaleString() + ' rpm' : null;
      const ext    = pd.extension   ? pd.extension.toFixed(1) + ' ft'  : null;
      const brkH   = brk.breakHorizontal != null ? (brk.breakHorizontal > 0 ? '+' : '') + brk.breakHorizontal.toFixed(1) + '"' : null;
      const brkV   = brk.breakVertical   != null ? (brk.breakVertical   > 0 ? '+' : '') + brk.breakVertical.toFixed(1) + '"'   : null;

      $('lp-speed').textContent = speed;

      const desc = result.toLowerCase();
      let resultColor = '#fff';
      if (desc.includes('called strike') || desc.includes('swinging strike') || desc.includes('foul tip')) resultColor = '#E74C3C';
      else if (desc.includes('in play')) resultColor = 'var(--light-teal)';
      else if (desc.includes('foul')) resultColor = '#FFC52F';
      else if (desc.includes('ball') || desc.includes('intentional')) resultColor = '#3EC88C';

      const rows = [
        ['Type',   type],
        ['Result', result, resultColor],
        spin  ? ['Spin',   spin]       : null,
        ext   ? ['Extension', ext]     : null,
        (brkH && brkV) ? ['Break', `${brkH} H / ${brkV} V`] : null,
      ].filter(Boolean);

      $('lp-rows').innerHTML = rows.map(([k, v, c]) =>
        `<div class="lp-row">
          <span class="lp-key">${k}</span>
          <span class="lp-val"${c ? ` style="color:${c}"` : ''}>${v}</span>
        </div>`
      ).join('');
    }

    /* ---------- PITCHER ARSENAL ---------- */
    function renderArsenal(feed) {
      const el = $('card-arsenal');
      if (feed.gameData.status.abstractGameState !== 'Live') { el.style.display = 'none'; return; }

      const cp = feed.liveData.plays && feed.liveData.plays.currentPlay;
      if (!cp) { el.style.display = 'none'; return; }

      const pitcherId = cp.matchup && cp.matchup.pitcher && cp.matchup.pitcher.id;
      const pitcherName = (cp.matchup && cp.matchup.pitcher && cp.matchup.pitcher.fullName) || 'Pitcher';

      const allPlays = (feed.liveData.plays && feed.liveData.plays.allPlays) || [];
      const pitchMap = {};
      let total = 0;

      for (const play of allPlays) {
        const playPitcherId = play.matchup && play.matchup.pitcher && play.matchup.pitcher.id;
        if (pitcherId && playPitcherId !== pitcherId) continue;

        for (const event of (play.playEvents || [])) {
          if (!event.isPitch || !event.details || !event.details.type) continue;
          const code = event.details.type.code;
          const name = event.details.type.description;
          const spd  = event.pitchData && event.pitchData.startSpeed;
          if (!pitchMap[code]) pitchMap[code] = { name, count: 0, totalSpeed: 0, speeds: [] };
          pitchMap[code].count++;
          total++;
          if (spd) { pitchMap[code].totalSpeed += spd; pitchMap[code].speeds.push(spd); }
        }
      }

      if (!total) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      $('arsenal-head').textContent = `${pitcherName} · Pitch Mix`;

      const sorted = Object.entries(pitchMap).sort((a, b) => b[1].count - a[1].count);
      const isGoth = document.body.classList.contains('goth');
      const isSF   = document.body.classList.contains('springfield');

      const COLORS = isGoth
        ? ['#9e9e9e', '#8B1A1A', '#777', '#aaa', '#666', '#bbb']
        : isSF
        ? ['#FF69B4', '#FFD90F', '#7ED957', '#4A4EFF', '#FF3B30', '#00B2A9']
        : ['#00B2A9', '#FFC52F', '#C4CED4', '#7B68EE', '#FF8C00', '#E74C3C'];

      $('arsenal-bars').innerHTML = sorted.map(([, d], i) => {
        const pct = Math.round(d.count / total * 100);
        const avg = d.speeds.length ? (d.totalSpeed / d.speeds.length).toFixed(1) + ' mph' : '--';
        return `<div class="arsenal-row">
          <div class="arsenal-name">${d.name}</div>
          <div class="arsenal-bar-wrap">
            <div class="arsenal-bar" style="width:${pct}%; background:${COLORS[i % COLORS.length]}"></div>
          </div>
          <div class="arsenal-pct">${pct}%</div>
          <div class="arsenal-speed">${avg}</div>
        </div>`;
      }).join('');
    }

    /* ---------- SPRAY CHART ---------- */
    function renderSprayChart(feed) {
      const el = $('card-spray');

      const allPlays = ((feed.liveData.plays && feed.liveData.plays.allPlays) || [])
        .filter(p => p.about && p.about.isComplete);

      const batted = [];
      for (const play of allPlays) {
        for (const event of (play.playEvents || [])) {
          const hd = event.hitData;
          if (!hd || !hd.coordinates || hd.coordinates.coordX == null || hd.coordinates.coordY == null) continue;
          batted.push({
            x:    hd.coordinates.coordX,
            y:    hd.coordinates.coordY,
            type: (play.result && play.result.eventType) || '',
            spd:  hd.launchSpeed,
            ang:  hd.launchAngle,
            dist: hd.totalDistance,
          });
        }
      }

      if (!batted.length) { el.style.display = 'none'; return; }
      el.style.display = 'block';

      const isGoth = document.body.classList.contains('goth');
      const isSF   = document.body.classList.contains('springfield');
      const grassColor = isGoth ? 'rgba(255,255,255,0.035)' : isSF ? 'rgba(126,217,87,0.16)' : 'rgba(0,90,40,0.22)';
      const dirtColor  = isGoth ? 'rgba(255,255,255,0.05)'  : 'rgba(150,95,45,0.22)';
      const lineColor  = isGoth ? 'rgba(255,255,255,0.16)'  : 'rgba(255,255,255,0.22)';

      // MLB hit coordinates put home plate at HIGH coordY (~200) and the outfield
      // at LOW coordY (~20), with coordX ~125 dead center. So we map svgX = coordX
      // and svgY = coordY directly (no flip) to keep home plate at the bottom and
      // the outfield wall at the top, fanning out the way a real field does.
      const HX = 125, HY = 215;                 // home plate
      const LFp = [38, 60], RFp = [212, 60];    // foul poles
      const B2 = [125, 155], B1 = [157, 185], B3 = [93, 185];  // bases

      const fieldBg = `
        <path d="M${HX},${HY} L${LFp[0]},${LFp[1]} Q125,0 ${RFp[0]},${RFp[1]} Z"
              fill="${grassColor}" stroke="${lineColor}" stroke-width="1"/>
        <path d="M${HX},${HY} L${B1[0]},${B1[1]} L${B2[0]},${B2[1]} L${B3[0]},${B3[1]} Z"
              fill="${dirtColor}" stroke="${lineColor}" stroke-width="0.5"/>
        <line x1="${HX}" y1="${HY}" x2="${LFp[0]}" y2="${LFp[1]}" stroke="${lineColor}" stroke-width="1"/>
        <line x1="${HX}" y1="${HY}" x2="${RFp[0]}" y2="${RFp[1]}" stroke="${lineColor}" stroke-width="1"/>
        <g fill="rgba(255,255,255,0.28)" stroke="${lineColor}" stroke-width="0.5">
          <rect x="-3.5" y="-3.5" width="7" height="7" transform="translate(${B1[0]},${B1[1]}) rotate(45)"/>
          <rect x="-3.5" y="-3.5" width="7" height="7" transform="translate(${B2[0]},${B2[1]}) rotate(45)"/>
          <rect x="-3.5" y="-3.5" width="7" height="7" transform="translate(${B3[0]},${B3[1]}) rotate(45)"/>
        </g>
        <polygon points="${HX-4},${HY-4} ${HX+4},${HY-4} ${HX+4},${HY} ${HX},${HY+4} ${HX-4},${HY}"
                 fill="rgba(255,255,255,0.35)"/>
        <text x="${LFp[0]-2}" y="${LFp[1]-6}" fill="rgba(255,255,255,0.3)" font-size="10" font-family="system-ui,sans-serif">LF</text>
        <text x="118" y="22" fill="rgba(255,255,255,0.3)" font-size="10" font-family="system-ui,sans-serif">CF</text>
        <text x="${RFp[0]-14}" y="${RFp[1]-6}" fill="rgba(255,255,255,0.3)" font-size="10" font-family="system-ui,sans-serif">RF</text>
      `;

      const dots = batted.map(b => {
        const et = b.type.toLowerCase();
        let color;
        if (et === 'home_run')                              color = '#FFC52F';
        else if (['single','double','triple'].includes(et)) color = isGoth ? '#C8C8C8' : '#00B2A9';
        else                                                color = '#E74C3C';

        const title = [
          et.replace(/_/g, ' '),
          b.spd  ? `${b.spd.toFixed(0)} mph`  : '',
          b.ang  != null ? `${b.ang > 0 ? '+' : ''}${b.ang.toFixed(0)}°` : '',
          b.dist ? `${Math.round(b.dist)} ft` : '',
        ].filter(Boolean).join(' · ');

        return `<circle cx="${b.x.toFixed(1)}" cy="${b.y.toFixed(1)}"
          r="4.5" fill="${color}" opacity="0.82" stroke="rgba(0,0,0,0.35)" stroke-width="0.5">
          <title>${title}</title></circle>`;
      }).join('');

      $('spray-svg').innerHTML = fieldBg + dots;

      const last = batted[batted.length - 1];
      if (last) {
        const parts = [];
        if (last.spd)  parts.push(`${last.spd.toFixed(0)} mph EV`);
        if (last.ang  != null) parts.push(`${last.ang > 0 ? '+' : ''}${last.ang.toFixed(0)}° LA`);
        if (last.dist) parts.push(`${Math.round(last.dist)} ft`);
        $('spray-meta').textContent = parts.length ? `Last batted ball: ${parts.join(' · ')}` : '';
      } else {
        $('spray-meta').textContent = '';
      }
    }

    /* ---------- EXIT VELOCITY FLASH TOAST ---------- */
    function flashEV(speed, angle, eventType) {
      const toast = $('ev-toast');
      if (!toast || !speed) return;
      const et = (eventType || '').replace(/_/g, ' ');
      toast.innerHTML =
        (et ? `<span class="ev-type">${et}</span>` : '') +
        `<span class="ev-speed">${speed.toFixed(0)} mph</span>` +
        (angle != null ? `<span class="ev-angle">${angle > 0 ? '+' : ''}${angle.toFixed(0)}°</span>` : '');
      toast.className = 'ev-toast show';
      clearTimeout(toast._dismissTimer);
      toast._dismissTimer = setTimeout(() => { toast.className = 'ev-toast'; }, 4000);
    }

    /* ---------- poll loop ---------- */
    let backoff = 0;
    async function poll() {
      try {
        const feed = await getJSON(`${API}/api/v1.1/game/${gamePk}/feed/live`);
        render(feed);
        backoff = 0;
        const state = feed.gameData.status.abstractGameState;
        clearTimeout(pollTimer);
        if (state === 'Live') pollTimer = setTimeout(poll, 8000);
        else if (state === 'Preview') pollTimer = setTimeout(poll, 30000);
        // Final: stop polling
      } catch (e) {
        backoff = Math.min(backoff + 1, 5);
        clearTimeout(pollTimer);
        pollTimer = setTimeout(poll, 5000 * backoff);
      }
    }

    (async function init() {
      try {
        gamePk = await resolveGamePk();
        await poll();
      } catch (e) {
        $('loading').style.display = 'none';
        $('fatal').style.display = 'block';
        $('fatal-msg').textContent = e.message || 'Could not load the game.';
      }
    })();
  </script>
</body>
</html>
